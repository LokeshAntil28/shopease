<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEase</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f7f8fc; color: #1a1a1a; }
nav {
  background: #fff; padding: 0 5%; height: 62px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 1px 4px rgba(0,0,0,0.07); position: sticky; top: 0; z-index: 100;
}
.nav-logo { font-size: 1.4rem; font-weight: 800; color: #6366f1; }
.nav-right { display: flex; align-items: center; gap: 16px; }
.cart-btn {
  display: flex; align-items: center; gap: 6px;
  background: #6366f1; color: #fff; border: none;
  padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background .2s; position: relative;
}
.cart-btn:hover { background: #4f46e5; }
.cart-count {
  background: #ef4444; color: #fff; border-radius: 50%;
  width: 18px; height: 18px; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* Search & Filter */
.controls {
  max-width: 1100px; margin: 28px auto 0; padding: 0 20px;
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
}
.search-input {
  flex: 1; min-width: 200px; padding: 10px 16px; border-radius: 8px;
  border: 1.5px solid #e2e8f0; font-size: 14px; outline: none;
  transition: border-color .2s; background: #fff;
}
.search-input:focus { border-color: #6366f1; }
.filter-select {
  padding: 10px 14px; border-radius: 8px; border: 1.5px solid #e2e8f0;
  font-size: 14px; outline: none; background: #fff; cursor: pointer;
}

/* Products */
.products-header {
  max-width: 1100px; margin: 20px auto 0; padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.products-header h2 { font-size: 18px; font-weight: 700; }
.result-count { font-size: 13px; color: #888; }
.products-grid {
  max-width: 1100px; margin: 16px auto 40px; padding: 0 20px;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px;
}
.product-card {
  background: #fff; border-radius: 14px; overflow: hidden;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: transform .2s, box-shadow .2s;
}
.product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
.product-img {
  background: #f0f0f0; height: 180px;
  display: flex; align-items: center; justify-content: center;
  font-size: 72px;
}
.product-info { padding: 14px 16px; }
.product-category { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.product-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
.product-price { font-size: 18px; font-weight: 800; color: #6366f1; margin-bottom: 10px; }
.product-rating { font-size: 12px; color: #f59e0b; margin-bottom: 12px; }
.add-to-cart {
  width: 100%; padding: 10px; border-radius: 8px;
  background: #6366f1; color: #fff; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s;
}
.add-to-cart:hover { background: #4f46e5; }
.add-to-cart.added { background: #10b981; }

/* Cart Sidebar */
.cart-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 200; display: none;
}
.cart-overlay.open { display: block; }
.cart-sidebar {
  position: fixed; right: 0; top: 0; bottom: 0; width: 380px;
  background: #fff; z-index: 201; transform: translateX(100%);
  transition: transform .3s; box-shadow: -4px 0 24px rgba(0,0,0,0.1);
  display: flex; flex-direction: column;
}
.cart-sidebar.open { transform: translateX(0); }
.cart-header {
  padding: 20px 24px; border-bottom: 1px solid #f0f2f5;
  display: flex; align-items: center; justify-content: space-between;
}
.cart-header h3 { font-size: 18px; font-weight: 700; }
.close-cart { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }
.cart-items { flex: 1; overflow-y: auto; padding: 16px 24px; }
.cart-item {
  display: flex; gap: 12px; align-items: center;
  padding: 12px 0; border-bottom: 1px solid #f0f2f5;
}
.cart-item-icon { font-size: 36px; flex-shrink: 0; }
.cart-item-info { flex: 1; }
.cart-item-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.cart-item-price { font-size: 13px; color: #6366f1; font-weight: 700; }
.qty-controls { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.qty-btn {
  width: 24px; height: 24px; border-radius: 50%;
  border: 1px solid #e2e8f0; background: #fff;
  font-size: 14px; font-weight: 700; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.qty-btn:hover { background: #6366f1; color: #fff; border-color: #6366f1; }
.qty-val { font-size: 14px; font-weight: 600; min-width: 20px; text-align: center; }
.remove-btn { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; }
.remove-btn:hover { color: #ef4444; }
.cart-footer { padding: 20px 24px; border-top: 1px solid #f0f2f5; }
.cart-total { display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.checkout-btn {
  width: 100%; padding: 13px; border-radius: 10px;
  background: #6366f1; color: #fff; border: none;
  font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s;
}
.checkout-btn:hover { background: #4f46e5; }
.empty-cart { text-align: center; color: #aaa; padding: 40px 0; }
.empty-cart .cart-icon { font-size: 48px; margin-bottom: 12px; }
@media (max-width: 500px) { .cart-sidebar { width: 100%; } }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">ShopEase 🛒</div>
  <div class="nav-right">
    <button class="cart-btn" onclick="toggleCart()">
      🛒 Cart <span class="cart-count" id="cart-count">0</span>
    </button>
  </div>
</nav>

<div class="controls">
  <input class="search-input" type="text" id="search" placeholder="Search products..." oninput="renderProducts()">
  <select class="filter-select" id="category-filter" onchange="renderProducts()">
    <option value="all">All Categories</option>
    <option value="Electronics">Electronics</option>
    <option value="Clothing">Clothing</option>
    <option value="Books">Books</option>
    <option value="Food">Food</option>
    <option value="Home">Home</option>
  </select>
  <select class="filter-select" id="sort-filter" onchange="renderProducts()">
    <option value="default">Sort by</option>
    <option value="price-asc">Price: Low to High</option>
    <option value="price-desc">Price: High to Low</option>
    <option value="rating">Top Rated</option>
  </select>
</div>

<div class="products-header">
  <h2>Products</h2>
  <span class="result-count" id="result-count"></span>
</div>
<div class="products-grid" id="products-grid"></div>

<!-- Cart -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cart-sidebar">
  <div class="cart-header">
    <h3>Your Cart</h3>
    <button class="close-cart" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-total"><span>Total</span><span id="cart-total">₹0</span></div>
    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout →</button>
  </div>
</div>

<script>
const PRODUCTS = [
  { id:1, name:'Wireless Headphones', category:'Electronics', price:2499, rating:4.5, icon:'🎧', reviews:128 },
  { id:2, name:'Mechanical Keyboard', category:'Electronics', price:3999, rating:4.7, icon:'⌨️', reviews:89 },
  { id:3, name:'Smart Watch', category:'Electronics', price:7999, rating:4.3, icon:'⌚', reviews:234 },
  { id:4, name:'Running Shoes', category:'Clothing', price:1799, rating:4.4, icon:'👟', reviews:156 },
  { id:5, name:'Cotton T-Shirt', category:'Clothing', price:599, rating:4.2, icon:'👕', reviews:312 },
  { id:6, name:'JavaScript Book', category:'Books', price:899, rating:4.8, icon:'📗', reviews:67 },
  { id:7, name:'React Mastery', category:'Books', price:1299, rating:4.9, icon:'📘', reviews:45 },
  { id:8, name:'Coffee Beans (500g)', category:'Food', price:699, rating:4.6, icon:'☕', reviews:203 },
  { id:9, name:'Desk Lamp', category:'Home', price:1499, rating:4.1, icon:'💡', reviews:78 },
  { id:10, name:'Water Bottle', category:'Home', price:399, rating:4.5, icon:'🧴', reviews:445 },
  { id:11, name:'Bluetooth Speaker', category:'Electronics', price:1999, rating:4.3, icon:'🔊', reviews:167 },
  { id:12, name:'Backpack', category:'Clothing', price:1299, rating:4.4, icon:'🎒', reviews:92 },
];

let cart = JSON.parse(localStorage.getItem('se_cart') || '[]');

function saveCart() { localStorage.setItem('se_cart', JSON.stringify(cart)); }

function stars(r) {
  return '★'.repeat(Math.floor(r)) + (r % 1 >= 0.5 ? '½' : '') + ` (${r})`;
}

function renderProducts() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('category-filter').value;
  const sort = document.getElementById('sort-filter').value;

  let list = PRODUCTS.filter(p =>
    (cat === 'all' || p.category === cat) &&
    (p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q))
  );

  if (sort === 'price-asc')  list.sort((a,b) => a.price - b.price);
  if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
  if (sort === 'rating')     list.sort((a,b) => b.rating - a.rating);

  document.getElementById('result-count').textContent = `${list.length} product${list.length !== 1 ? 's' : ''}`;
  document.getElementById('products-grid').innerHTML = list.map(p => {
    const inCart = cart.some(c => c.id === p.id);
    return `<div class="product-card">
      <div class="product-img">${p.icon}</div>
      <div class="product-info">
        <div class="product-category">${p.category}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">₹${p.price.toLocaleString('en-IN')}</div>
        <div class="product-rating">${stars(p.rating)} · ${p.reviews} reviews</div>
        <button class="add-to-cart ${inCart?'added':''}" onclick="addToCart(${p.id})">
          ${inCart ? '✓ In cart' : '+ Add'}
        </button>

      </div>
    </div>`;
  }).join('');

}

function addToCart(id) {
  const p = PRODUCTS.find(p => p.id === id);
  const existing = cart.find(c => c.id === id);
  if (existing) { existing.qty++; } else { cart.push({ ...p, qty: 1 }); }
  saveCart(); updateCartUI(); renderProducts();
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  saveCart(); updateCartUI(); renderProducts();
}

function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) removeFromCart(id);
  else { saveCart(); updateCartUI(); }
}

function updateCartUI() {
  const total = cart.reduce((s,c) => s + c.qty, 0);
  document.getElementById('cart-count').textContent = total;
  const footer = document.getElementById('cart-footer');
  if (cart.length === 0) {
    document.getElementById('cart-items').innerHTML = `<div class="empty-cart"><div class="cart-icon">🛒</div><p>Your cart is empty</p></div>`;
    footer.style.display = 'none';
  } else {
    document.getElementById('cart-items').innerHTML = cart.map(c => `
      <div class="cart-item">
        <div class="cart-item-icon">${c.icon}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${c.name}</div>
          <div class="cart-item-price">₹${(c.price * c.qty).toLocaleString('en-IN')}</div>
          <div class="qty-controls">
            <button class="qty-btn" onclick="changeQty(${c.id},-1)">−</button>
            <span class="qty-val">${c.qty}</span>
            <button class="qty-btn" onclick="changeQty(${c.id},1)">+</button>
          </div>
        </div>
        <button class="remove-btn" onclick="removeFromCart(${c.id})">✕</button>
      </div>

    `).join('');
    const cartTotal = cart.reduce((s,c) => s + c.price * c.qty, 0);
    document.getElementById('cart-total').textContent = `₹${cartTotal.toLocaleString('en-IN')}`;

    footer.style.display = 'block';
  }
}

function toggleCart() {
  document.getElementById('cart-sidebar').classList.toggle('open');
  document.getElementById('cart-overlay').classList.toggle('open');
}

function checkout() {
  alert(`🎉 Order placed! Total: ₹${cart.reduce((s,c)=>s+c.price*c.qty,0).toLocaleString('en-IN')}\n\nThank you for shopping with ShopEase!`);
  cart = []; saveCart(); updateCartUI(); toggleCart();
}

renderProducts();
updateCartUI();
</script>
</body>
</html>
